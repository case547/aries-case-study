{# Shared page shell: head (fonts, styles, HTMX), the masthead/tab nav, and a
   {% block content %} that search.html/results.html fill in via {% extends "base.html" %}. #}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>News Analysis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <header class="masthead">
    <div class="masthead-row">
      <span class="masthead-wordmark">News Analysis</span>
    </div>
    <nav class="tabs">
      <a class="tab {{ 'is-active' if request.url.path == '/' else '' }}" href="/">Search</a>
      <a class="tab {{ 'is-active' if request.url.path == '/results' else '' }}" href="/results">Results</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
